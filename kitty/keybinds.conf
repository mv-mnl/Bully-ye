# =======================================================
# ATAJOS DE TECLADO (ESTILO TMUX Y MANEJO FLUIDO)
# =======================================================

# Modificador por defecto (Ctrl + Shift)
kitty_mod ctrl+shift

# --- PORTAPAPELES ---
map kitty_mod+c copy_to_clipboard
map kitty_mod+v paste_from_clipboard

# --- PESTAÑAS (TABS) ---
map alt+t new_tab
map alt+w close_window
map alt+right next_tab
map alt+left previous_tab

# --- VENTANAS (SPLITS - ESTILO TMUX) ---
# Abrir nueva ventana en la MISMA ruta donde estás (cwd)
map alt+enter launch --cwd=current

# Divisiones específicas (Split horizontal y vertical)
map alt+h launch --cwd=current --type=window --location=hsplit
map alt+v launch --cwd=current --type=window --location=vsplit

# Moverse entre ventanas rápidamente con Ctrl + Alt + Flechas (Liberando Ctrl + Flechas para apps)
map ctrl+alt+left  neighboring_window left
map ctrl+alt+right neighboring_window right
map ctrl+alt+up    neighboring_window up
map ctrl+alt+down  neighboring_window down

# Mover/Intercambiar la ventana actual con Ctrl + Shift + Flechas (Liberando Shift + Flechas para apps)
map ctrl+shift+up move_window up
map ctrl+shift+left move_window left
map ctrl+shift+right move_window right
map ctrl+shift+down move_window down

# Redimensionar los paneles/ventanas seleccionadas
map alt+shift+left resize_window narrower 3
map alt+shift+right resize_window wider 3
map alt+shift+up resize_window taller 3
map alt+shift+down resize_window shorter 3

# Volver a los tamaños equitativos originales
map alt+home resize_window reset

# --- LAYOUTS ---
# Cambiar entre modos de diseño (Ej. pasar de splits a stack/pantalla-completa)
map alt+l next_layout
