monitor=,preferred,auto,1.50


# ===================================================================
# TECLAS MULTIMEDIA Y DE SISTEMA (Laptop)
# ===================================================================

# Brillo de la pantalla (F2 y F3)
# Usamos 'bindel' para que se repita si mantienes la tecla presionada
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%-
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 5%+

# Brillo del teclado (F4)
# (Nota: Algunos teclados solo tienen un botón para alternar (toggle) o subir. 
# Si tu laptop usa un botón para ciclar, este comando suele funcionar)
bindel = , XF86KbdBrightnessUp, exec, brightnessctl -d *kbd_backlight set 10%+
# Si tuvieras un botón para bajar el brillo del teclado, sería:
# bindel = , XF86KbdBrightnessDown, exec, brightnessctl -d *kbd_backlight set 10%-

# Audio - Volumen y Mute (F5, F6, F7)
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+

# Micrófono - Mute (F8)
bindl  = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Control Multimedia (F9, F10, F11)
# Usamos 'bindl' para que funcione incluso si la pantalla está bloqueada
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next

# F12 (Sin asignar todavía)
# Muchas laptops tienen F12 como "Modo Avión", "Imprimir Pantalla" o "Calculadora". 
# Si luego decides qué hace, puedes usar wev para ver qué nombre tiene y asignarla.
# Ejemplo si quisieras que abra la calculadora de tu entorno:
# bind = , XF86Calculator, exec, qalculate-gtk